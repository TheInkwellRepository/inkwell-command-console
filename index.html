<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkwell OS - Command Console</title>
    <style>
        :root {
            --bg: #0a0f1d;
            --panel: #111a30;
            --border: #1e2d4a;
            --text: #e2e8f0;
            --text-muted: #cbd5e1;
            --action-green: #22c55e;
            --action-red: #dc2626;
            --accent-orange: #f97316;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.4;
            padding: 10px;
        }

        header {
            background-color: var(--panel);
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text); }
        
        .status-container { display: flex; align-items: center; margin-top: 5px; font-size: 0.85rem; }
        .status-dot { width: 10px; height: 10px; background-color: var(--action-green); border-radius: 50%; margin-right: 8px; }

        .section-box {
            background-color: var(--panel);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-orange);
            margin-bottom: 10px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            background-color: #1e293b;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        button:active { background-color: var(--border); }

        .btn-publish {
            background-color: var(--action-red);
            border: none;
            color: white;
            margin-top: 10px;
        }
        .btn-publish:active { background-color: #b91c1c; }

        /* The Infinite-Scroll Workspace Fix */
        .workspace-wrapper {
            width: 100%;
        }

        /* Textarea now resizes to display its entire content natively */
        textarea.dynamic-editor {
            height: auto;
            min-height: 400px;
            resize: none;
            overflow-y: hidden; /* Disables internal scroll completely */
            white-space: pre;
            overflow-x: auto;
        }

        .log-box {
            background-color: #05070f;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>File Editor Terminal</h1>
        <div class="status-container">
            <div class="status-dot"></div>
            <span>CONNECTION STATUS: CONNECTED</span>
        </div>
    </header>

    <div class="section-box">
        <div class="section-title">Choose File to Open</div>
        <select id="fileSelector" onchange="loadFileContent()">
            </select>
    </div>

    <div class="section-box">
        <div class="section-title">Sniper Search™</div>
        <input type="text" id="sniperInput" placeholder="Enter target string or variable...">
        <button onclick="runSniperSearch()">Find</button>
    </div>

    <div class="section-box">
        <div class="section-title">Save Note (Commit Message)</div>
        <input type="text" id="commitMessage" value="Updates via Mobile Console Engine v2">
    </div>

    <div class="section-box workspace-wrapper">
        <div class="section-title">Live Code Workspace</div>
        <textarea id="mainEditor" class="dynamic-editor" placeholder="[ File Loaded & Waiting ]" oninput="autoExpand(this)"></textarea>
        
        <button class="btn-publish" onclick="publishChanges()">Publish All Changes Live to GitHub</button>
    </div>

    <div class="section-box">
        <div class="section-title">System Activity Log</div>
        <div id="systemLog" class="log-box">Console pipeline standing by...</div>
    </div>

    <script>
        // Core API Configuration Storage
        let config = { token: '', user: '', repo: '', branch: '' };
        let currentFileSha = '';

        // Auto-load credentials from the active session string if present
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            config.token = params.get('t') || localStorage.getItem('inkwell_token');
            config.user = params.get('u') || localStorage.getItem('inkwell_user');
            config.repo = params.get('r') || localStorage.getItem('inkwell_repo');
            config.branch = params.get('b') || 'main';

            if(config.token && config.repo) {
                fetchRepositoryFiles();
            } else {
                updateLog("Initialization failed. Missing connection variables.");
            }
        });

        // The Engine that auto-expands the window dynamically
        function autoExpand(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function updateLog(msg) {
            document.getElementById('systemLog').innerText = msg;
        }

        async function fetchRepositoryFiles() {
            updateLog("Scanning remote vault tree...");
            const url = `https://api.github.com/repos/${config.user}/${config.repo}/git/trees/${config.branch}?recursive=1`;
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                const data = await response.json();
                if(data.tree) {
                    const selector = document.getElementById('fileSelector');
                    selector.innerHTML = '<option value="">-- Choose Target Repo File --</option>';
                    data.tree.forEach(file => {
                        if(file.type === 'blob') {
                            const opt = document.createElement('option');
                            opt.value = file.path;
                            opt.textContent = file.path;
                            selector.appendChild(opt);
                        }
                    });
                    updateLog("Repository architecture successfully cataloged.");
                } else {
                    updateLog("Error reading tree structure.");
                }
            } catch (err) {
                updateLog("Connection sequence interrupted.");
            }
        }

        async function loadFileContent() {
            const path = document.getElementById('fileSelector').value;
            if(!path) return;
            updateLog(`Pulling raw file stream: ${path}...`);
            const url = `https://api.github.com/repos/${config.user}/${config.repo}/contents/${path}?ref=${config.branch}`;
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `token ${config.token}` }
                });
                const data = await response.json();
                currentFileSha = data.sha;
                const decodedContent = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
                
                const editor = document.getElementById('mainEditor');
                editor.value = decodedContent;
                updateLog(`File locked into memory buffer.`);
                
                // Fire the auto-expand rule immediately on load
                autoExpand(editor);
            } catch (err) {
                updateLog("Failed to process file decoding.");
            }
        }

        function runSniperSearch() {
            const searchTerm = document.getElementById('sniperInput').value;
            const editor = document.getElementById('mainEditor');
            if(!searchTerm || !editor.value) return;

            const index = editor.value.indexOf(searchTerm);
            if(index !== -1) {
                editor.focus();
                editor.setSelectionRange(index, index + searchTerm.length);
                const lineBreakCount = editor.value.substring(0, index).split('\n').length;
                updateLog(`Target located on text sequence sequence line ${lineBreakCount}.`);
            } else {
                updateLog("Target string not found in file architecture.");
            }
        }

        async function publishChanges() {
            const path = document.getElementById('fileSelector').value;
            const msg = document.getElementById('commitMessage').value;
            const content = document.getElementById('mainEditor').value;
            if(!path) return updateLog("Error: No target file selected.");

            updateLog("Packaging and encrypting secure data streams...");
            const url = `https://api.github.com/repos/${config.user}/${config.repo}/contents/${path}`;
            const base64Content = btoa(unescape(encodeURIComponent(content)));

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${config.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: msg,
                        content: base64Content,
                        sha: currentFileSha,
                        branch: config.branch
                    })
                });
                if(response.ok) {
                    const data = await response.json();
                    currentFileSha = data.content.sha;
                    updateLog("PUBLISH SUCCESSFUL. Live build pushed to master cloud.");
                } else {
                    updateLog("Secure push rejected by repository authority.");
                }
            } catch(err) {
                updateLog("Network pipeline failed during push operation.");
            }
        }
    </script>
</body>
</html>
